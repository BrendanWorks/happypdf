# Netlify builds the Vite frontend from the frontend/ subdirectory.
# The 3 benchmark demos always replay bundled real snapshots client-side (free,
# instant). Live PDF upload calls the Modal API below (rate-limited to 10/day).
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Enables live PDF upload on the public site (rate-limited, paid GPU endpoint).
  VITE_API_URL = "https://brendanworks--happypdf-api-fastapi-app.modal.run"

# SPA: single page, no client routing, but keep a catch-all to be safe.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
